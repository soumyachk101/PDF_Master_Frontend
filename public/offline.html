<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Offline - DocShift</title>
  <style>
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: #0a0a0a;
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      padding: 20px;
    }
    .container {
      text-align: center;
      max-width: 500px;
    }
    h1 {
      font-size: 4rem;
      margin: 0 0 1rem 0;
      background: linear-gradient(135deg, #F05B25, #F47B4F);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    p {
      color: rgba(255,255,255,0.7);
      font-size: 1.1rem;
      line-height: 1.6;
      margin-bottom: 2rem;
    }
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: #F05B25;
      color: white;
      text-decoration: none;
      padding: 12px 24px;
      border-radius: 12px;
      font-weight: 600;
      transition: transform 0.2s, box-shadow 0.2s;
    }
    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(240, 91, 37, 0.3);
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Offline</h1>
    <p>You're currently offline. Don't worry - DocShift works entirely in your browser, so you can still use our PDF tools even without an internet connection!</p>
    <a href="/" class="btn">Refresh to Go Online</a>
  </div>
</body>
</html>
